<div class="container my-4">
    <div class="row align-items-center">
        <h2 class="text-center mb-3">Product List</h2>
    </div>
    
    <div class="row">
        <div class="col">
            <product-form (newProductEvent)="addProductHandler($event)" [product]="productSelected"></product-form>
        </div>
        <div class="col">
            @if(products.length > 0) {
            <table class="table table-striped table-hover">
                <thead>
                    <tr>                        
                        <th>Name</th>
                        <th>Description</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    @for (product of products; track product.id) {
                    <tr>                        
                        <td>{{ product.name }}</td>
                        <td>{{ product.description }}</td>
                        <td>{{ product.price }}</td>
                        <td>
                            <button (click)="editProduct(product)" class="btn btn-sm btn-secondary">Edit</button>
                            <button (click)="deleteProduct(product.id)" class="btn btn-sm btn-danger">Delete</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
            } @else {
            <div class="alert alert-info">No products available.</div>
            }
        </div>
    </div>
</div>
